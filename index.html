<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <title>Login Funny</title>
</head>
<body>
    <main class="container">
        <form>
            <h1>Login Tatu</h1>
            <div class="input-box">
                <input placeholder="Usuário" type="email">
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>
            <div class="remember-forgot">
                <label>
                <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueci a senha</a>
            </div>
            <button type="submit"class="login">Login</button>
            <div class="register-link">
                <p>Nao tem conta?<a href="#">Cadastre-se</a></p>
            </div>
        </form>
       
    </main>
        <div class="click-button">
            <h2>Conta clicks</h2>
                        
                <button id="boletao">Conta-cliques</button>
                <button id="reset">Reset</button>
                <p>Cliques:<span id="contador">0</span></p>
                
                <script>
                    const botao = document.getElementById("boletao");
                    const display_contador = document.getElementById("contador");
                    const botao_reset = document.getElementById("reset");

                    let counter = 0;
                    botao.addEventListener("click", () =>{
                        counter++;
                        display_contador.innerText = counter;
                    })
                    botao_reset.addEventListener("click", () =>{
                        counter = 0;
                        display_contador.innerText = counter;
                    })
                </script>
            </div>
        
        
</body>
</html>
